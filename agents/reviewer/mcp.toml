# Reviewer (Codex CLI) MCP config.
#
# Codex reads this from $CODEX_HOME/config.toml (default ~/.codex/config.toml).
# As of May 2026, Multica's daemon does NOT inject agent.mcp_config into Codex
# (PR #1288 still open). Until that lands, copy this file to the daemon host's
# ~/.codex/config.toml (or to a per-agent CODEX_HOME via wrapper script — see
# agents/MCP-WIRING.md Part B3) and replace the ${VAR} placeholders with real
# secrets. Codex does NOT auto-expand ${VAR} — values must be inlined.
#
# Sources:
#   https://github.com/openai/codex/blob/main/docs/config.md
#   https://developers.openai.com/codex/mcp

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
env = { GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_PAT_REVIEWER}" }

[mcp_servers.sentry]
command = "npx"
args = ["-y", "@sentry/mcp-server"]
env = { SENTRY_AUTH_TOKEN = "${SENTRY_REVIEWER_TOKEN}", SENTRY_ORG = "${SENTRY_ORG}" }

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "${MULTICA_TASK_WORKDIR}"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

[mcp_servers.multica]
command = "multica"
args = ["mcp", "serve", "--scope", "issues:write,context:read"]
